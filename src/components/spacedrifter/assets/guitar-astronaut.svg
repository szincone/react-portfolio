<svg xmlns="http://www.w3.org/2000/svg" width="240" height="260" viewBox="0 0 240 260" role="img" aria-labelledby="title">
<title>guitar astronaut</title>

<style>
  :root {
    --ink:#17213a;
    --muted:#64748b;
    --suit:#ffffff;
    --suitShade:#eef3f8;
    --trim:#9fb0c3;
    --glass:#dff4ff;
    --glassStroke:#b8c7d9;
    --blue:#58c7f7;
    --orange:#ff9f2f;
    --grayCat:#7c8795;
    --grayStripe:#626d7a;
    --orangeCat:#f59a28;
    --orangeStripe:#d97813;
    --skin:#f2c6a0;
    --shadow:#d9e2ec;
  }
  svg { overflow: visible; }
  .line { stroke:var(--ink); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; fill:none; }
  .soft-line { stroke:var(--trim); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; fill:none; }
  .helmet { fill:var(--glass); fill-opacity:.38; stroke:var(--glassStroke); stroke-width:3; }
  .suit { fill:var(--suit); stroke:var(--trim); stroke-width:2.5; }
  .shade { fill:var(--suitShade); }
  .panel { fill:#f8fafc; stroke:var(--trim); stroke-width:2; }
  .eye { fill:var(--ink); }
  .shine { fill:white; opacity:.85; }
  .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:var(--ink); font-size:18px; font-weight:700; letter-spacing:.02em; }
  .float-shadow { fill:var(--shadow); opacity:.45; }
  .accent-blue { fill:var(--blue); }
  .accent-orange { fill:var(--orange); }
</style>


<circle class="helmet" cx="120" cy="82" r="61"/>
<path class="shine" d="M74 56c8-18 25-29 44-32" stroke="white" stroke-width="9" stroke-linecap="round" fill="none" opacity=".75"/>
<path class="shine" d="M80 43c8-7 20-12 31-13" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity=".55"/>
<circle cx="120" cy="82" r="35" fill="var(--skin)"/>
<path d="M88 78c6-25 24-36 55-26c6 8 8 19 8 29c-9-6-19-7-32-7c-13 0-22 3-31 4z" fill="#4b5563"/>
<circle class="eye" cx="106" cy="84" r="5"/>
<circle class="eye" cx="134" cy="84" r="5"/>
<circle class="shine" cx="104" cy="82" r="1.8"/>
<circle class="shine" cx="132" cy="82" r="1.8"/>
<path d="M111 101q9 7 18 0" class="line" stroke-width="2.5"/>

<rect class="suit" x="57" y="128" width="25" height="56" rx="12" transform="rotate(25 69 156)"/>
<rect class="suit" x="158" y="126" width="25" height="58" rx="12" transform="rotate(-37 170 155)"/>
<circle class="suit" cx="61" cy="181" r="12"/>
<circle class="suit" cx="181" cy="176" r="12"/>

<rect class="suit" x="78" y="125" width="84" height="90" rx="34"/>
<rect class="shade" x="88" y="161" width="64" height="53" rx="25"/>
<rect class="suit" x="89" y="198" width="25" height="37" rx="12"/>
<rect class="suit" x="126" y="198" width="25" height="37" rx="12"/>
<rect class="suit" x="78" y="118" width="84" height="19" rx="9"/>
<rect class="panel" x="96" y="153" width="48" height="31" rx="8"/>
<circle class="accent-blue" cx="111" cy="167" r="6"/>
<circle class="accent-orange" cx="130" cy="167" r="6"/>
<rect fill="#cbd5e1" x="107" y="176" width="26" height="4" rx="2"/>

<g transform="rotate(-18 121 171)">
  <path d="M89 182c-16-8-18-30 3-38 12-5 20 7 26 4 7-4 13-17 29-10 22 9 22 34 4 45-19 12-43 10-62-1z" fill="#ffb35c" stroke="#17213a" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="120" cy="162" r="11" fill="#17213a" opacity=".78"/>
  <rect x="143" y="153" width="54" height="9" rx="4" fill="#8b5e3c" stroke="#17213a" stroke-width="2"/>
  <rect x="190" y="149" width="18" height="17" rx="4" fill="#8b5e3c" stroke="#17213a" stroke-width="2"/>
  <path d="M148 156h50M148 160h50M148 164h50" stroke="#f8fafc" stroke-width="1"/>
</g>


</svg>
